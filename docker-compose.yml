services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
        NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
        NEXT_PUBLIC_STORAGE_MIGRATION_TARGET_URL: ${NEXT_PUBLIC_STORAGE_MIGRATION_TARGET_URL:-}
    restart: unless-stopped
    ports:
      - "4500:3000"
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
